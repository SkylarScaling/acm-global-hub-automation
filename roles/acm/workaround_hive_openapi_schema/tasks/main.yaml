---
# Workaround for hive-controllers CrashLoopBackOff on MCE 2.11.x caused by a
# broken OpenAPI $ref in the clusterview/v1alpha1 UserPermission type served by
# ocm-proxyserver. The kube-apiserver aggregates this broken schema, causing
# Hive's resource.Helper initialisation to fatal on any affected controller.
#
# On clusters where hive was already bootstrapped before the bug manifested
# (e.g. the Global Hub), hive-controllers exists but crashes — the fix is to
# patch its --disabled-controllers list directly.
#
# On freshly-provisioned clusters (e.g. Regional Hubs), hive-operator ALSO hits
# the broken schema and cannot create the hive namespace or hive-controllers at
# all. The fix there is to temporarily clear the broken APIServices and restart
# kube-apiserver so hive-operator can complete its initial bootstrap, then apply
# the patch before restoring MCE.
#
# All waits use oc shell commands — kubernetes.core.k8s_info has been observed
# to silently return empty results against spoke cluster kubeconfigs while oc
# connects successfully.
#
# This role is a no-op outside the affected version range and is idempotent
# if the workaround has already been applied.
# See: ISSUES.md #10

# ==============================================================================
# STEP 1 — Detect the installed MCE version
# ==============================================================================
- name: Query MultiClusterEngine resource to detect installed version
  kubernetes.core.k8s_info:
    kubeconfig: "{{ target_kubeconfig }}"
    api_version: multicluster.openshift.io/v1
    kind: MultiClusterEngine
    name: multiclusterengine
  register: _mce_resource

- name: Extract MCE version from MultiClusterEngine status
  ansible.builtin.set_fact:
    _mce_version: "{{ _mce_resource.resources[0].status.currentVersion }}"

# ==============================================================================
# STEP 2 — Evaluate whether the workaround is required
# ==============================================================================
- name: Determine if hive-controllers workaround is required for MCE {{ _mce_version }}
  ansible.builtin.set_fact:
    _hive_workaround_required: >-
      {{
        _mce_version is version(mce_hive_openapi_bug_min_version, '>=', version_type='semver') and
        _mce_version is version(mce_hive_openapi_bug_fixed_version, '<', version_type='semver')
      }}

- name: Report workaround status
  ansible.builtin.debug:
    msg: >-
      MCE {{ _mce_version }} —
      {% if _hive_workaround_required %}
      ⚠️  In affected range [{{ mce_hive_openapi_bug_min_version }}, {{ mce_hive_openapi_bug_fixed_version }}].
      Applying hive-controllers OpenAPI schema workaround.
      {% else %}
      ✅ Not in affected range. No workaround needed.
      {% endif %}

# ==============================================================================
# STEP 3 — Apply the workaround (skipped if not required)
# ==============================================================================
- name: Apply hive-controllers OpenAPI schema workaround
  when: _hive_workaround_required
  block:

    # --------------------------------------------------------------------------
    # STEP 3a — Bootstrap hive if hive-operator failed to create it
    #
    # On fresh MCE 2.11.x installs, hive-operator hits the broken OpenAPI schema
    # via resource.Helper before it can create the hive namespace or the
    # hive-controllers deployment. The fix: temporarily clear all ocm-proxyserver
    # APIServices and restart kube-apiserver so it rebuilds its schema cache
    # without the broken UserPermission $ref. hive-operator can then bootstrap
    # hive successfully. The patch is applied before MCE is restored so that
    # hive-operator cannot revert it (hive-operator will fail to reconcile once
    # the broken schema is back, which is what locks the patch in place).
    # --------------------------------------------------------------------------
    - name: Check if hive-controllers deployment already exists
      ansible.builtin.shell: >
        {{ bin_dir }}/oc get deployment hive-controllers -n hive
        --kubeconfig {{ target_kubeconfig }}
        -o jsonpath='{.metadata.name}' 2>/dev/null || true
      register: _hive_dep_precheck
      changed_when: false

    - name: Bootstrap hive — hive-operator could not create it due to broken OpenAPI schema
      when: _hive_dep_precheck.stdout != "hive-controllers"
      block:

        - name: Save MCE operator replica count before scaling down
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get deployment multicluster-engine-operator
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.spec.replicas}'
          register: _mce_op_replicas
          changed_when: false

        - name: Save ocm-proxyserver replica count before scaling down
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get deployment ocm-proxyserver
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.spec.replicas}'
          register: _ocm_proxy_replicas
          changed_when: false

        - name: Scale down MCE operator to prevent APIService recreation
          ansible.builtin.shell: >
            {{ bin_dir }}/oc scale deployment multicluster-engine-operator
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            --replicas=0
          changed_when: true

        - name: Scale down ocm-proxyserver
          ansible.builtin.shell: >
            {{ bin_dir }}/oc scale deployment ocm-proxyserver
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            --replicas=0
          changed_when: true

        - name: Delete all ocm-proxyserver APIServices to clear the broken schema source
          ansible.builtin.shell: >
            {{ bin_dir }}/oc delete apiservice
            v1.clusterview.open-cluster-management.io
            v1alpha1.clusterview.open-cluster-management.io
            v1beta1.proxy.open-cluster-management.io
            --kubeconfig {{ target_kubeconfig }}
            --ignore-not-found
          changed_when: true

        - name: Wait for ocm-proxyserver pods to fully terminate
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get pods -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            -l app=ocm-proxyserver
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true
          register: _proxy_pods_check
          until: _proxy_pods_check.stdout == ""
          retries: 12
          delay: 10
          changed_when: false

        # Deleting the APIServices alone is not enough — kube-apiserver caches the
        # broken schema in memory even after the backend is gone. A rolling restart
        # forces it to rebuild its OpenAPI cache from scratch, this time without the
        # broken clusterview schema.
        - name: Restart kube-apiserver to flush the cached broken OpenAPI schema
          ansible.builtin.shell: >
            {{ bin_dir }}/oc delete pod
            -n openshift-kube-apiserver
            -l app=openshift-kube-apiserver
            --kubeconfig {{ target_kubeconfig }}
          changed_when: true

        - name: Wait for kube-apiserver to come back
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get namespace default
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.metadata.name}' 2>/dev/null || true
          register: _apiserver_ready
          until: _apiserver_ready.stdout == "default"
          retries: 24  # Up to 6 minutes
          delay: 15
          changed_when: false

        - name: Bounce hive-operator to trigger a fresh reconcile against the clean schema
          ansible.builtin.shell: >
            {{ bin_dir }}/oc rollout restart deployment/hive-operator
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
          changed_when: true

        - name: Wait for hive namespace to be created by hive-operator
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get namespace hive
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.metadata.name}' 2>/dev/null || true
          register: _hive_ns_bootstrap
          until: _hive_ns_bootstrap.stdout == "hive"
          retries: 40  # Up to 20 minutes
          delay: 30
          changed_when: false

        - name: Wait for hive-controllers deployment to be created
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get deployment hive-controllers -n hive
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.metadata.name}' 2>/dev/null || true
          register: _hive_dep_bootstrap
          until: _hive_dep_bootstrap.stdout == "hive-controllers"
          retries: 40  # Up to 20 minutes
          delay: 30
          changed_when: false

        - name: Wait for hive-controllers to become available
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get deployment hive-controllers -n hive
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true
          register: _hive_available
          until: (_hive_available.stdout | default('0') | int) >= 1
          retries: 20
          delay: 15
          changed_when: false

        # Apply the patch now, while MCE is still down and hive-operator is using the
        # clean schema. Once MCE is restored the broken schema returns, hive-operator
        # fails to reconcile HiveConfig, and the patch persists.
        - name: Get current hive-controllers disabled controllers list for bootstrap patch
          ansible.builtin.shell: >
            {{ bin_dir }}/oc get deployment hive-controllers -n hive
            --kubeconfig {{ target_kubeconfig }}
            -o jsonpath='{.spec.template.spec.containers[0].args[1]}'
          register: _bootstrap_current_disabled
          changed_when: false

        - name: Build bootstrap patch value
          ansible.builtin.set_fact:
            _bootstrap_patch_value: >-
              {{ _bootstrap_current_disabled.stdout }},{{ mce_hive_openapi_disabled_controllers | join(',') }}

        - name: Patch hive-controllers to disable affected controllers
          ansible.builtin.shell: >
            {{ bin_dir }}/oc patch deployment hive-controllers -n hive
            --kubeconfig {{ target_kubeconfig }}
            --type=json
            -p='[{"op": "replace", "path": "/spec/template/spec/containers/0/args/1", "value": "{{ _bootstrap_patch_value }}"}]'
          changed_when: true

        - name: Wait for patched hive-controllers rollout to complete
          ansible.builtin.shell: >
            {{ bin_dir }}/oc rollout status deployment/hive-controllers -n hive
            --kubeconfig {{ target_kubeconfig }}
            --timeout=8m
          changed_when: false

        - name: Restore MCE operator to original replica count
          ansible.builtin.shell: >
            {{ bin_dir }}/oc scale deployment multicluster-engine-operator
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            --replicas={{ _mce_op_replicas.stdout }}
          changed_when: true

        - name: Restore ocm-proxyserver to original replica count
          ansible.builtin.shell: >
            {{ bin_dir }}/oc scale deployment ocm-proxyserver
            -n multicluster-engine
            --kubeconfig {{ target_kubeconfig }}
            --replicas={{ _ocm_proxy_replicas.stdout }}
          changed_when: true

        - name: Report bootstrap workaround complete
          ansible.builtin.debug:
            msg: >-
              ✅ Hive bootstrapped and workaround applied.
              Disabled controllers: {{ _bootstrap_patch_value }}
              MCE components restored — broken schema will return and lock the patch in place.

    # --------------------------------------------------------------------------
    # STEP 3b — Verify and apply the patch to an existing hive-controllers
    #
    # Handles both the normal case (hive exists, hive-controllers is crashing)
    # and the idempotent re-run after bootstrap (patch was already applied above).
    # --------------------------------------------------------------------------
    - name: Wait for hive-controllers deployment
      ansible.builtin.shell: >
        {{ bin_dir }}/oc get deployment hive-controllers -n hive
        --kubeconfig {{ target_kubeconfig }}
        -o jsonpath='{.metadata.name}' 2>/dev/null || true
      register: _hive_dep_check
      until: _hive_dep_check.stdout == "hive-controllers"
      retries: 40  # Up to 20 minutes (hive-operator reconciliation lags ArgoCD sync)
      delay: 30
      changed_when: false

    - name: Get hive-controllers deployment spec
      ansible.builtin.command: >
        {{ bin_dir }}/oc get deployment hive-controllers -n hive
        --kubeconfig {{ target_kubeconfig }}
        -o json
      register: _hive_deployment_raw
      changed_when: false

    - name: Parse hive-controllers deployment spec
      ansible.builtin.set_fact:
        _hive_deployment: "{{ _hive_deployment_raw.stdout | from_json }}"

    - name: Verify --disabled-controllers flag is present in deployment args
      ansible.builtin.assert:
        that:
          - "'--disabled-controllers' in _hive_deployment.spec.template.spec.containers[0].args"
        fail_msg: >-
          hive-controllers does not contain --disabled-controllers in its args.
          The Hive deployment structure may have changed. Review ISSUES.md #10 and
          apply the workaround manually.

    - name: Parse current args and locate --disabled-controllers value
      ansible.builtin.set_fact:
        _hive_container_name: "{{ _hive_deployment.spec.template.spec.containers[0].name }}"
        _hive_args: "{{ _hive_deployment.spec.template.spec.containers[0].args }}"
        _disabled_idx: "{{ _hive_deployment.spec.template.spec.containers[0].args.index('--disabled-controllers') }}"

    - name: Extract current disabled controllers list
      ansible.builtin.set_fact:
        _current_disabled: "{{ _hive_args[_disabled_idx | int + 1].split(',') }}"

    - name: Check if workaround controllers are already disabled (idempotency)
      ansible.builtin.set_fact:
        _workaround_already_applied: >-
          {{ mce_hive_openapi_disabled_controllers | difference(_current_disabled) | length == 0 }}

    - name: Skip — workaround already applied
      ansible.builtin.debug:
        msg: >-
          ✅ Controllers already disabled: {{ mce_hive_openapi_disabled_controllers | join(', ') }}.
          No patch needed.
      when: _workaround_already_applied

    - name: Build updated args list with workaround controllers added
      ansible.builtin.set_fact:
        _new_disabled_str: >-
          {{ (_current_disabled + mce_hive_openapi_disabled_controllers) | unique | join(',') }}
        _new_args: >-
          {{
            _hive_args[:_disabled_idx | int + 1] +
            [(_current_disabled + mce_hive_openapi_disabled_controllers) | unique | join(',')] +
            _hive_args[_disabled_idx | int + 2:]
          }}
      when: not _workaround_already_applied

    - name: Patch hive-controllers deployment to disable affected controllers
      kubernetes.core.k8s:
        kubeconfig: "{{ target_kubeconfig }}"
        state: present
        api_version: apps/v1
        kind: Deployment
        name: hive-controllers
        namespace: hive
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: "{{ _hive_container_name }}"
                    args: "{{ _new_args }}"
      when: not _workaround_already_applied

    # The patch triggers a rolling restart. The new pod must wait up to 120 s for
    # the old pod's leader lease to expire before it can start controllers.
    - name: Wait for hive-controllers rollout to complete (allow 8 min for lease handover)
      ansible.builtin.shell: >
        {{ bin_dir }}/oc rollout status deployment/hive-controllers -n hive
        --kubeconfig {{ target_kubeconfig }}
        --timeout=8m
      changed_when: false
      when: not _workaround_already_applied

    - name: Confirm hive-controllers is healthy with workaround applied
      ansible.builtin.debug:
        msg: >-
          ✅ hive-controllers is running. Disabled controllers: {{ _new_disabled_str }}
      when: not _workaround_already_applied
