---
- name: Deploy Custom Dashboards to Global Hub
  kubernetes.core.k8s:
    kubeconfig: "{{ target_kubeconfig }}"
    state: present
    template: "{{ item }}"
  loop:
    - kpi-dashboard.yaml.j2
    - caas-kpi-dashboard.yaml.j2
    - cluster-uptime-dashboard.yaml.j2
    - argocd-dashboard.yaml.j2
    - k8s-dashboard.yaml.j2