---
- name: Wait for ACM CRDs to be fully registered
  kubernetes.core.k8s_info:
    kubeconfig: "{{ target_kubeconfig }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: managedclustersetbindings.cluster.open-cluster-management.io
  register: crd_check
  until:
    - crd_check.resources is defined
    - crd_check.resources | length > 0
  retries: 60
  delay: 10

- name: Deploy User Workload Monitoring Policy
  kubernetes.core.k8s:
    kubeconfig: "{{ target_kubeconfig }}"
    state: present
    template: "uwm-policy.yaml.j2"