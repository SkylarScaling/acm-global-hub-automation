---
# ==============================================================================
# ROUTING INTEGRATIONS (Pulled from global inventory variables)
# ==============================================================================

# SMTP Mapping
alerting_smtp_host: "{{ smtp.host }}"
alerting_smtp_port: "{{ smtp.port }}"
alerting_smtp_from: "{{ smtp.from_address }}"
alerting_smtp_require_tls: "{{ smtp.require_tls }}"
alerting_smtp_username: "{{ smtp.username }}"
alerting_smtp_password: "{{ smtp.app_password }}"

# Destination Mapping
alerting_email_default_to: "{{ smtp.default_to }}"
alerting_email_esp_to: "{{ smtp.esp_to }}"

# ==============================================================================
# CUSTOMER INPUT REQUIRED: Alert Thresholds
# ==============================================================================
spoke_offline_threshold_minutes: "5m"
storage_critical_threshold_percent: "90"

# ==============================================================================
# ROUTING: Target the Regional Hubs based on the label defined in 01-managed-cluster.yaml.j2
# ==============================================================================
regional_hub_cluster_label_key: "global-hub.open-cluster-management.io/managed-hub"
regional_hub_cluster_label_value: "true"